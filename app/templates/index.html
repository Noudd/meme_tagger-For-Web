<!--
  Meme Tagger 主页面模板
  单页应用结构，包含：
  - 顶部导航栏（品牌名 + 统计摘要）
  - 操作区（目录输入、扫描、打标签、导出按钮）
  - 统计栏（各状态计数）
  - 进度区（打标签任务实时进度条）
  - 图片列表区（卡片网格 + 筛选/搜索 + 批量删除）
  - 分页导航
  - Toast 通知容器
  - 回到顶部按钮
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme 标签器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand">Meme 标签器</span>
            <div class="d-flex align-items-center gap-3">
                <div id="navbar-stats" class="d-flex gap-2"></div>
            </div>
        </div>
    </nav>

    <div class="container py-4" id="app">
        <div class="row g-3 mb-4 align-items-end">
            <div class="col-lg-5">
                <label class="form-label small text-secondary fw-semibold mb-1">扫描目录</label>
                <div class="input-group">
                    <input type="text" id="directory-input" class="form-control"
                           placeholder="例如 C:\Users\me\Pictures\memes" autocomplete="off">
                    <button id="scan-btn" class="btn btn-primary px-4" onclick="scanDirectory()">扫描</button>
                </div>
                <div id="scan-result" class="mt-2 small"></div>
            </div>
            <div class="col-lg-7 d-flex align-items-end justify-content-lg-end gap-2 mt-2 mt-lg-0">
                <button id="tag-btn" class="btn btn-success px-4" onclick="startTagging()" disabled>全部打标签</button>
                <button id="export-btn" class="btn btn-outline-info px-4" onclick="exportDatabase()">导出数据库</button>
                <button class="btn btn-outline-secondary px-3" onclick="loadMemes()" title="刷新">
                    <span class="d-none d-md-inline">刷新</span>
                    <span class="d-md-none">&#x21bb;</span>
                </button>
            </div>
        </div>

        <div id="stats-bar" class="stats-bar mb-4"></div>

        <div id="progress-section" class="d-none mb-4">
            <div class="d-flex align-items-center gap-3 mb-2">
                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                <span id="progress-text" class="fw-medium">处理中...</span>
                <span id="progress-pct" class="text-secondary small"></span>
            </div>
            <div class="progress" style="height: 8px;">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated"
                     style="width: 0%"></div>
            </div>
            <div id="current-file" class="small text-muted mt-2 text-truncate"></div>
            <div id="progress-errors" class="mt-2"></div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0 fw-semibold">图片列表</h5>
            <div class="d-flex gap-2">
                <select id="status-filter" class="form-select form-select-sm w-auto" onchange="loadMemes()">
                    <option value="">全部状态</option>
                    <option value="pending">待处理</option>
                    <option value="processing">处理中</option>
                    <option value="completed">已完成</option>
                    <option value="error">错误</option>
                </select>
                <input type="text" id="search-input" class="form-control form-control-sm w-auto"
                       placeholder="搜索文件或标签..." autocomplete="off">
                <button id="batch-delete-btn" class="btn btn-outline-danger btn-sm d-none" onclick="batchDelete()">
                    删除选中
                </button>
            </div>
        </div>

        <div id="memes-container" class="row g-3"></div>

        <nav class="mt-4">
            <ul id="pagination" class="pagination justify-content-center"></ul>
        </nav>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <button id="scroll-top-btn" class="scroll-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">
        &#8593;
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
